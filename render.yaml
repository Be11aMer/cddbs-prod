services:
  # Backend API Service
  - type: web
    name: cddbs-api
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cddbs-db
          property: connectionString
      - key: PYTHONPATH
        value: /app
      - key: ALLOWED_ORIGINS
        value: "*" # This allows the frontend to communicate with the API

  # Frontend UI Service (with Nginx Proxy)
  - type: web
    name: cddbs-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: frontend/Dockerfile
    plan: free

databases:
  - name: cddbs-db
    plan: free
