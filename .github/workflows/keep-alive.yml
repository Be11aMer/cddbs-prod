name: Keep Render alive

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf https://cddbs-api.onrender.com/health \
            --max-time 30 \
            --retry 2 \
            || echo "Backend warming up — not a failure"
