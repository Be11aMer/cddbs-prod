name: SBOM Generation

# Generates a CycloneDX Software Bill of Materials on every push to main/development
# and on pull requests targeting those branches.
# The SBOM artifact is uploaded for 90 days — satisfies EU CRA Art. 13(15).

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies + cyclonedx-bom
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM (JSON)
        run: cyclonedx-py environment --output-format json --output-file sbom.json
        # cyclonedx-py scans the current Python environment — the most accurate method
        # for pip-based projects (superior to scanning requirements.txt alone)

      - name: Validate SBOM is non-empty
        run: |
          python3 -c "
          import json, sys
          with open('sbom.json') as f:
              sbom = json.load(f)
          comp_count = len(sbom.get('components', []))
          print(f'SBOM components: {comp_count}')
          if comp_count == 0:
              print('ERROR: SBOM has no components', file=sys.stderr)
              sys.exit(1)
          print('SBOM validation passed')
          "

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: sbom-cyclonedx-json
          path: sbom.json
          retention-days: 90
          # 90-day retention satisfies CRA Art. 13(15) record-keeping requirements
          # Regulators can request access to this artifact on reasoned request

      - name: Print SBOM summary
        run: |
          python3 -c "
          import json
          with open('sbom.json') as f:
              sbom = json.load(f)
          metadata = sbom.get('metadata', {})
          components = sbom.get('components', [])
          print(f'SBOM Format: {sbom.get(\"bomFormat\", \"unknown\")} {sbom.get(\"specVersion\", \"\")}')
          print(f'Serial Number: {sbom.get(\"serialNumber\", \"n/a\")}')
          if 'component' in metadata:
              c = metadata['component']
              print(f'Root Component: {c.get(\"name\", \"n/a\")} {c.get(\"version\", \"\")}')
          print(f'Total Components: {len(components)}')
          "
