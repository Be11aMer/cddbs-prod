name: Secret Scan

on:
  pull_request:
    branches: [main, master, development]
  push:
    branches: [main, master, development]

jobs:
  detect-secrets:
    name: Detect Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan for hardcoded secrets
        run: python scripts/detect_secrets.py

      - name: Check diff for secrets (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Scan only the changed files in this PR for extra scrutiny
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' '*.ts' '*.tsx' '*.js' '*.yml' '*.yaml' '*.json' '*.env' '*.sh' '*.txt')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No scannable files changed."
            exit 0
          fi

          echo "Scanning changed files for secrets..."
          FOUND=0

          for file in $CHANGED_FILES; do
            if [ ! -f "$file" ]; then
              continue
            fi

            # Skip the secret detection script itself (contains regex patterns that trigger false positives)
            if [ "$(basename "$file")" = "detect_secrets.py" ]; then
              continue
            fi

            # Check for high-entropy strings in the diff
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- "$file" | grep '^+' | grep -v '^+++')

            # Check for common secret patterns in added lines
            if echo "$DIFF" | grep -qiP '(api[_\-]?key|secret|token|password|bearer|credential)\s*[:=]\s*["'"'"'][A-Za-z0-9_\-/.+]{20,}["'"'"']'; then
              echo "::error file=$file::Potential secret detected in changed lines of $file"
              FOUND=1
            fi

            # Check for AWS keys
            if echo "$DIFF" | grep -qE 'AKIA[0-9A-Z]{16}'; then
              echo "::error file=$file::AWS access key detected in $file"
              FOUND=1
            fi

            # Check for private keys
            if echo "$DIFF" | grep -q 'BEGIN.*PRIVATE KEY'; then
              echo "::error file=$file::Private key detected in $file"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "::error::Secrets detected in PR changes. Remove all hardcoded credentials and use environment variables."
            exit 1
          fi

          echo "No secrets found in changed files."
